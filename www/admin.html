<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>YMA Admin Dashboard</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="admin-page">

    <header class="admin-topbar">

      <h1>👑 YMA ADMIN</h1>

      <p>Control Panel</p>

    </header>

    <div class="admin-welcome">

      <h2>Welcome Admin 👋</h2>

      <p>Manage YMA Unlimited Wi-Fi</p>

    </div>

    <div class="admin-grid">

      <div
  class="admin-card"
  onclick="window.location.href='admin-users.html'"
>
  <div class="admin-icon">👥</div>

  <h3>Users</h3>

  <p>Manage users</p>
</div>

      <div class="admin-card">
        <div class="admin-icon">📶</div>

        <h3>Wi-Fi Network</h3>

        <p>Manage network</p>
      </div>

      <div
  class="admin-card"
  onclick="window.location.href='admin-plans.html'"
>
  <div class="admin-icon">💳</div>

  <h3>Plans</h3>

  <p>Manage Wi-Fi plans</p>
</div>

      <div
  class="admin-card"
  onclick="window.location.href='admin-payments.html'"
>
  <div class="admin-icon">💰</div>

  <h3>Payments</h3>

  <p>View payments</p>
</div>

      <div class="admin-card">
        <div class="admin-icon">📊</div>

        <h3>Statistics</h3>

        <p>View app statistics</p>
      </div>

      <div
        class="admin-card"
        onclick="adminLogout()"
      >

        <div class="admin-icon">🚪</div>

        <h3>Logout</h3>

        <p>Exit admin panel</p>

      </div>

    </div>

  </div>

  <script src="admin.js"></script>
<script>
  if (
    localStorage.getItem("ymaAdmin")
    !== "true"
  ) {
    window.location.href =
      "admin-login.html";
  }
</script>
</body>

</html>
