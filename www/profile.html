<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Profile - YMA</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="profile-page">

    <div class="profile-header">
      <div class="profile-icon">👤</div>

      <h1>My Profile</h1>

      <p>Manage your YMA account</p>
    </div>

    <div class="profile-card">

      <div class="profile-row">
        <span>👤</span>

        <div>
          <small>Name</small>
          <strong id="profileName">YMA User</strong>
        </div>
      </div>

      <div class="profile-row">
        <span>📱</span>

        <div>
          <small>Phone Number</small>
          <strong id="profilePhone">Not added</strong>
        </div>
      </div>

      <div class="profile-row">
        <span>💰</span>

        <div>
          <small>Wallet Balance</small>
          <strong id="profileBalance">₦0.00</strong>
        </div>
      </div>

      <div class="profile-row">
        <span>📶</span>

        <div>
          <small>Active Plan</small>
          <strong id="activePlan">No Active Plan</strong>
        </div>
      </div>

    </div>

    <button
      class="back-button"
      onclick="goBack()"
    >
      ← Back to Dashboard
    </button>

  </div>

  <script src="profile.js"></script>

</body>

</html>
