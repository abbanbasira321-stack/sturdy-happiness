<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Connect Wi-Fi - YMA</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="wifi-page">

    <div class="wifi-header">
      <div class="wifi-icon">📶</div>

      <h1>YMA Wi-Fi</h1>

      <p>Connect to YMA Unlimited Wi-Fi</p>
    </div>

    <div class="wifi-card">

      <div class="status">
        <span class="status-dot"></span>

<div class="network-section">

  <h3>📡 Available Networks</h3>

  <div class="network-item selected">
    <span>📶</span>

    <div>
      <strong>YMA Unlimited Wi-Fi</strong>
      <p>Strong Signal • Secure</p>
    </div>

    <span>🔒</span>
  </div>

  <div class="network-item">
    <span>📶</span>

    <div>
      <strong>YMA Guest Wi-Fi</strong>
      <p>Medium Signal • Secure</p>
    </div>

    <span>🔒</span>
  </div>

</div>        <div>
          <strong id="statusText">
            Disconnected
          </strong>

          <p>YMA Wi-Fi Network</p>
        </div>
      </div>

      <button
        id="connectButton"
        onclick="connectWifi()"
      >
        CONNECT
      </button>

      <div class="info">

        <div>
          <span>⏱️</span>
          <p>Time Remaining</p>
          <strong id="timeRemaining">
            Not Connected
          </strong>
        </div>

        <div>
          <span>📊</span>
          <p>Data Usage</p>
          <strong id="dataUsage">
            0 MB
          </strong>
        </div>

      </div>

    </div>

    <button
      class="back-button"
      onclick="goBack()"
    >
      ← Back to Dashboard
    </button>

  </div>

  <script src="connect-wifi.js"></script>

</body>
</html>
